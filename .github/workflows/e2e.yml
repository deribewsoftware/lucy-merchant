name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        run: npm run test:e2e
        env:
          CI: true
          # next build is not run here; dev server uses NODE_ENV=development JWT fallback if unset
          AUTH_SECRET: playwright-ci-e2e-secret-at-least-32-characters-long
